# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend — lint, compile, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: actypity_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}
      APP_STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/actypity_test
      AUTH_ENABLED: "false"
      DEBUG: "true"
      # Prefer setting CI_SECRET_KEY in GitHub Actions secrets. If not set, CI jobs may fail for some checks.
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile check
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/container.py
          python -m py_compile backend/config.py
          python -m py_compile backend/database.py
          python -m py_compile backend/auth.py
          python -m py_compile backend/log_handler.py
          python -m py_compile backend/metrics.py
          python -m py_compile backend/model_router.py
          python -m py_compile backend/internal_api.py
          python -m py_compile backend/storage.py
          python -m py_compile backend/schemas.py
          python -m py_compile agents/agent_orchestrator.py
          python -m py_compile agents/agent_registry.py
          python -m py_compile agents/example_agent.py
          python -m py_compile agents/agent_skills.py
          python -m py_compile agents/workflow_engine.py
          python -m py_compile shared/base_agent.py

      - name: Import check
        run: python -c "from backend.main import app; print('import ok')"

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=backend \
            --cov=agents \
            --cov=shared \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  frontend:
    name: Frontend — lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
