apiVersion: apps/v1
kind: Deployment
metadata:
  name: actypity-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actypity-frontend
  template:
    metadata:
      labels:
        app: actypity-frontend
    spec:
      containers:
      - name: frontend
        image: actypity/frontend:latest
        ports:
        - containerPort: 4173
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: actypity-frontend-service
spec:
  selector:
    app: actypity-frontend
  ports:
    - protocol: TCP
      port: 4173
      targetPort: 4173
  type: LoadBalancer
