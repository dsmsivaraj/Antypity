apiVersion: v1
kind: Secret
metadata:
  name: actypity-secrets
type: Opaque
data:
  # All values are base64-encoded. Regenerate with: echo -n "value" | base64
  # ── App ──────────────────────────────────────────────────────────
  # NOTE: All values below are intentionally placeholder values. Do NOT commit real secrets into repository.
  # Replace these with base64-encoded values in your deployment pipeline or use Kubernetes Secret management.
  SECRET_KEY: "<base64-SECRET_KEY-goes-here>"
  INTERNAL_API_TOKEN: "<base64-INTERNAL_API_TOKEN-goes-here>"

  # ── Auth ─────────────────────────────────────────────────────────
  DEFAULT_ADMIN_KEY: "<base64-DEFAULT_ADMIN_KEY>"
  ACTYPITY_ADMIN_KEY: "<base64-ACTYPITY_ADMIN_KEY>"
  ACTYPITY_VIEWER_KEY: "<base64-ACTYPITY_VIEWER_KEY>"
  BOOTSTRAP_ADMIN_TOKEN: "<base64-BOOTSTRAP_ADMIN_TOKEN>"

  # ── Azure OpenAI ─────────────────────────────────────────────────
  # Set AZURE_OPENAI_API_KEY and AZURE_OPENAI_ENDPOINT in your CI/CD or secrets manager.
  AZURE_OPENAI_API_KEY: "<base64-AZURE_OPENAI_API_KEY>"
  AZURE_OPENAI_ENDPOINT: "<base64-AZURE_OPENAI_ENDPOINT>"

  # ── Database ─────────────────────────────────────────────────────
  # Update DATABASE_URL for production PostgreSQL connection string (base64-encoded)
  DATABASE_URL: "<base64-DATABASE_URL>"

  # ── Ollama ───────────────────────────────────────────────────────
  OLLAMA_MODELS: "<base64-OLLAMA_MODELS>"

  # ── Job Portals (fill in when API credentials are obtained) ──────
  # RAPIDAPI_KEY: <base64-encoded-rapidapi-key>
  # LINKEDIN_CLIENT_ID: <base64-encoded-linkedin-client-id>
  # LINKEDIN_CLIENT_SECRET: <base64-encoded-linkedin-client-secret>
  # INDEED_PUBLISHER_ID: <base64-encoded-indeed-publisher-id>
  # GLASSDOOR_PARTNER_ID: <base64-encoded-glassdoor-partner-id>
  # GLASSDOOR_API_KEY: <base64-encoded-glassdoor-api-key>
  # ADZUNA_APP_ID: <base64-encoded-adzuna-app-id>
  # ADZUNA_API_KEY: <base64-encoded-adzuna-api-key>

  # ── Social Auth ──────────────────────────────────────────────────
  # GOOGLE_CLIENT_ID: <base64-encoded-google-client-id>
  # GOOGLE_CLIENT_SECRET: <base64-encoded-google-client-secret>
